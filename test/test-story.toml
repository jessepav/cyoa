[config]
title = "Story of Bob"

backgroundColor = "#333355"
textColor = "white"
maxWidth = "600px"

fontSize = "20px"
fontFamily = "Underdog"
fontLinkHref = "https://fonts.googleapis.com/css2?family=Underdog"
# fontFamily = "BryanTalbot"
# fontCSS = """
# @font-face {
#   font-family: "BryanTalbot";
#   src: url("https://site.com/resources/fonts/comicraft/otf/CCBryanTalbotRegular.otf") format("opentype");
# }
# """

useBold = false

imageRendering = "pixelated"
# imageBaseURL = "https://site.com/img/"

stateInit = '''
  state.resurrects = 0;
  state.waterAmount = 0;
'''

statePropertiesToPersist = [
  "resurrects"
]

onPassageTransition = '''
  const origin = originPassageId;
  const dest = destinationPassageId;

  if (dest == 'water')
    state.waterAmount++;
  else if (dest == 'eat' && state.waterAmount > 0)
    return "buff";
'''

startId = "intro"

[intro]
name = "Bob"
text = """
== This is a story about Bob. Click "Let's Go!" to begin ==
"""
choices = [ { text = "Let's Go!", destId = "hello" } ]

[hello]
name = "Bob's Story"
text = """
Hello, this is the story of <u>Bob</u>.

Bob is a nice mushroom. He lives in a forest with other mushrooms and
also a rabbit named Glowy who can glow in the dark. ==

   == They are a nice group of forest creatures. ==

<%= state.resurrects > 0
      ? `Bob has been resurrected <b>${state.resurrects}</b> time(s).`
      : "Bob has never known the Reaper's cruel hand." %>
"""

[hello.img]
src = "bob.png"
width = "256px"
float = "right"

[hello.music]
src = "bob.webm"
loop = false

[[hello.choices]]
text = "Feed Bob Water"
destId = "water"

[[hello.choices]]
text = "Eat Bob"
destId = "eat"

[water]
name = "Yummy Water"
text = "== Bob drinks <i>a lot</i> of water and is happy.<br>He grew really fat! =="
choices = [
  { text = "Eat him anyway", destId = "eat" },
  { text = "Say hello again", destId = "hello" }
]

[water.img]
src = "bob.png"
width = "484px"
height = "212px"
align = "center"

[water.music]
src = "nomnomnom.webm"
stream = true
loop = true

[eat]
name = "Bob is Eaten"
text = """
Oh no, Bob was <s>comforted</s> <b>munched</b> up.

Yummy yummy gu.
"""

choices = [
  { text = "But he is robust, and can live again! Bob 4eva.",
    destId = "hello",
    code = "state.resurrects++;"}
]

[buff]
name = "Bob got Buff!"
text = """
You tried to eat Bob, but you can't, because he drank
water and got <b>buff</b>!
"""
img = {
  src = "bob-buff.png",
  width = "256px",
  align = "center"
}
choices = [
  { text = "Luckily, Bob isn't mad, and wants to stay friends",
    destId = "hello" }
]
